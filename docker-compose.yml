services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: lumia
      POSTGRES_PASSWORD: lumia
      POSTGRES_DB: lumia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/evolution-init.sql:/docker-entrypoint-initdb.d/evolution-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumia"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  evolution:
    image: atendai/evolution-api:v2.2.3
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: http://localhost:8081
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgres://lumia:lumia@postgres:5432/lumia?sslmode=disable&search_path=evolution,public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      REDIS_URI: redis://redis:6379
      AUTHENTICATION_API_KEY: changeme
      DEL_INSTANCE: false
      LANGUAGE: pt-BR
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_data:/evolution/instances

  api:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgres://app_user:app_pw@postgres:5432/lumia?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  evolution_data:
