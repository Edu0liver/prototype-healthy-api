services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: lumia
      POSTGRES_PASSWORD: lumia
      POSTGRES_DB: lumia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/evolution-init.sql:/docker-entrypoint-initdb.d/evolution-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumia"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console (http://localhost:9001)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  evolution:
    image: atendai/evolution-api:v2.2.3
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: http://localhost:8081
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgres://lumia:lumia@postgres:5432/lumia?sslmode=disable&schema=evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      REDIS_URI: redis://redis:6379
      AUTHENTICATION_API_KEY: changeme
      DEL_INSTANCE: false
      LANGUAGE: pt-BR
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_data:/evolution/instances

  api:
    build: .
    # app_user only exists after `make migrate-up`; restart until migrations land.
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: app_user
      PG_PASSWORD: app_pw
      PG_DB: lumia
      PG_SSLMODE: disable
      REDIS_URL: redis://redis:6379
      EVOLUTION_BASE_URL: http://evolution:8080
      # Evolution must reach the api by its service name inside the compose network.
      EVOLUTION_WEBHOOK_URL: http://api:8080/webhooks/evolution
      # MinIO is reachable by its service name inside the compose network.
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: lumia
      STORAGE_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  evolution_data:
  minio_data:
